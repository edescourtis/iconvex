name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  compatibility:
    strategy:
      fail-fast: false
      matrix:
        include:
          - otp: "26.2"
            elixir: "1.16.3"
          - otp: "27.3"
            elixir: "1.18.4"
          - otp: "28.0"
            elixir: "1.19.5"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}
      - run: mix deps.get --check-locked
      - run: mix compile --warnings-as-errors
      - run: mix test --cover

  release-artifact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28.0"
          elixir-version: "1.19.5"
      - run: elixir tools/release_check.exs

  documentation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28.0"
          elixir-version: "1.19.5"
      - run: mix deps.get --check-locked
      - run: mix docs --warnings-as-errors
      - run: ICONVEX_VERIFY_DOC_MIRRORS=1 mix test test/release_metadata_test.exs
