name: Iconvex full stack CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  core-compatibility:
    name: Core OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - otp: "26.2"
            elixir: "1.16.3"
          - otp: "27.3"
            elixir: "1.18.4"
          - otp: "28.0"
            elixir: "1.19.5"
    defaults:
      run:
        working-directory: iconvex
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}
      - run: mix deps.get --check-locked
      - run: mix compile --warnings-as-errors
      - run: mix test --cover

  extension-and-integration-tests:
    name: ${{ matrix.directory }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - directory: iconvex_extras
          - directory: iconvex_telecom
          - directory: iconvex_specs_icu_archive_a
          - directory: iconvex_specs_icu_archive_b
          - directory: iconvex_specs_icu_archive_c
          - directory: iconvex_specs
          - directory: iconvex_integration
    env:
      ICONVEX_PATH: ../iconvex
      ICONVEX_ARCHIVE_PATH: ..
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28.0"
          elixir-version: "1.19.5"
      - run: mix deps.get --check-locked
      - run: mix format --check-formatted
      - run: mix compile --warnings-as-errors
      - run: mix test --cover

  core-release-artifact:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iconvex
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28.0"
          elixir-version: "1.19.5"
      - run: elixir tools/release_check.exs

  core-documentation:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: iconvex
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28.0"
          elixir-version: "1.19.5"
      - run: mix deps.get --check-locked
      - run: mix format --check-formatted
      - run: mix docs --warnings-as-errors
      - run: ICONVEX_VERIFY_DOC_MIRRORS=1 mix test test/release_metadata_test.exs
